name: ETF Trend Monitor

on:
  schedule:
    - cron: '0 23 * * 1-5' # Run at a set time after the market closes, Monday through Friday (UTC time).
  workflow_dispatch:      # Allows you to manually click to run on the GitHub webpage.
  repository_dispatch:    # Allows external remote wake-up via API
    types: [ telegram_trigger ]

permissions:
  contents: write

jobs:
  run-etf-trend-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f quant_trade/requirements.txt ]; then pip install -r quant_trade/requirements.txt; fi

      - name: Execute Pipeline
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python quant_trade/track_etf.py

      - name: Commit and Push Dashboard
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add docs/index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update dashboard snapshot" && git push)
