name: ETF Trend Monitor

on:
  schedule:
    - cron: '0 22 * * 1-5' # Run at a set time after the market closes, Monday through Friday (UTC time).
  workflow_dispatch:      # Allows you to manually click to run on the GitHub webpage.
  repository_dispatch:    # Allows external remote wake-up via API
    types: [ telegram_trigger ]

jobs:
  run-etf-trend-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Pipeline
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python track_etf.py
