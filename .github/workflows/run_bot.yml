name: ETF Trend Monitor

on:
  schedule:
    # Runs daily at 22:30 UTC / 06:30 Kuala Lumpur time.
    # This is scheduled after the US market close.
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  run-etf-trend-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas matplotlib requests

      - name: Run ETF trend monitor
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        working-directory: ./quant_trade
        run: python track_etf.py
