name: 7x24h Live Quant Bot

on:
  schedule:
    # 每天吉隆坡时间早上 6:30（美股收盘后半小时，换算成 UTC 时间是 22:30）自动在云端唤醒执行
    - cron: '30 22 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上点击按钮随时手动触发测试

jobs:
  run-quant-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install yfinance pandas matplotlib requests

    - name: Execute Quant Tracker
      env:
        # 让云端服务器安全读取你的 Telegram 隐私密钥
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      # 💥 就是下面这一行！告诉服务器代码在 quant_trade 文件夹里
      working-directory: ./quant_trade
      run: |
        python track_etf.py
