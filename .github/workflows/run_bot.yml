name: 7x24h Live Quant Bot

on:
  schedule:
    # It automatically wakes up and executes in the cloud every day at 6:30 AM Kuala Lumpur time (half an hour after the US stock market closes, which is 10:30 PM UTC).
    - cron: '30 22 * * *'
  workflow_dispatch: # Allows you to manually trigger tests at any time by clicking a button on the GitHub webpage.

jobs:
  run-quant-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install yfinance pandas matplotlib requests

    - name: Execute Quant Tracker
      env:
        # Allow cloud servers to securely access your Telegram privacy key.
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      
      working-directory: ./quant_trade
      run: |
        python track_etf.py
